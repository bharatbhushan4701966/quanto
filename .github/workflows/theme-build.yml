name: Build and Release Theme

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  release:
    types: [created]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.1'
        # tools: phpcs # Uncomment if you want to run PHP CodeSniffer

    # - name: Run PHPCS
    #   run: phpcs --standard=WordPress .

    - name: Package Theme
      run: |
        mkdir -p dist/quanto
        rsync -a --exclude='dist' --exclude='.git' --exclude='.github' . dist/quanto/
        cd dist
        zip -r quanto.zip quanto/
      
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: quanto-theme
        path: dist/quanto.zip

    - name: FTP Deploy to Staging
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: ./dist/quanto/
        # Adjust server-dir if the wp-content directory is located elsewhere inside the staging folder
        server-dir: /qai8358l95-staging.onrocket.site/wp-content/themes/quanto/
        
    - name: Upload to Release
      if: github.event_name == 'release'
      uses: softprops/action-gh-release@v1
      with:
        files: dist/quanto.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
